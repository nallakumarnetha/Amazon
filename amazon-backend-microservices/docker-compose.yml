version: "3.9"

networks:
  microservices-net:

volumes:
  mysql-data:

services:

  # =======================
  # INFRASTRUCTURE
  # =======================

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - microservices-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - microservices-net

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - microservices-net

  # =======================
  # SPRING CLOUD CORE
  # =======================

  config-server:
    image: kumarnalla/config-server:latest
    container_name: config-server
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - mysql
    networks:
      - microservices-net

  service-registry:
    image: kumarnalla/service-registry:latest
    container_name: service-registry
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - config-server
    networks:
      - microservices-net

  api-gateway:
    image: kumarnalla/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - service-registry
      - config-server
    networks:
      - microservices-net

  # =======================
  # BUSINESS SERVICES
  # =======================

  cart-service:
    image: kumarnalla/cart-service:latest
    container_name: cart-service
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - mysql
      - rabbitmq
      - service-registry
    networks:
      - microservices-net

  common-service:
    image: kumarnalla/common-service:latest
    container_name: common-service
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - service-registry
    networks:
      - microservices-net

  file-service:
    image: kumarnalla/file-service:latest
    container_name: file-service
    ports:
      - "8083:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - mysql
    networks:
      - microservices-net

  order-service:
    image: kumarnalla/order-service:latest
    container_name: order-service
    ports:
      - "8084:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - mysql
      - rabbitmq
      - service-registry
    networks:
      - microservices-net
    
  product-service:
    image: kumarnalla/product-service:latest
    container_name: product-service
    ports:
      - "8085:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - mysql
      - service-registry
    networks:
      - microservices-net        

  user-service:
    image: kumarnalla/user-service:latest
    container_name: user-service
    ports:
      - "8086:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - mysql
      - rabbitmq
      - service-registry
      - config-server
    networks:
      - microservices-net

  frontend:
    image: kumarnalla/amazon-frontend-microservices:latest
    container_name: frontend
    ports:
      - "4200:4200"
    networks:
      - microservices-net

